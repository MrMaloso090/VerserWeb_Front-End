<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>___registro_de_control_ar</title>
  <link rel="stylesheet" href="_style_coordinacion.css"> <!-- CONECCION CON EL .CSS -->
</head>
<body>
  <!-- COMIENZO DEL CODIGO -->
   <div class="full">
    <h1>AR</h1>
    <hr>

    <div class="container">

      <div>
        <nav>
          <ul>
            <li><a href="_ar.html">AR</a></li>
            <li><a href="_bisel.html">Bisel</a></li>
            <li><a href="_calidad.html">Calidad</a></li>
            <li><a href="_digitacion.html">Digitacion</a></li>
            <li><a href="_facturacion.html">Facturacion</a></li>
            <li><a href="_ingresos.html">Ingresos</a></li>
            <li><a href="_talla.html">Talla</a></li>
            <li><a href="_coating.html">Coating</a></li>
            <li><a href="_inventario.html">Inventario</a></li>
          </ul>
        </nav>
      </div>

      <!--LOGIN-->
      <div class="login" id="login">
        <div class="login-container">
          Inicio de Sesion:
          <input type="password" id="codigo" name="passcode" placeholder="Ingresa tu código">
          <button onclick="verificacion()" id="iniciar">Entrar</button>
          <p id="error" style="color:red; display:none;">Código incorrecto</p>
        </div>
      </div>
      
      <!-- CUESTIONARIO -->
      <form id="formulario" style="display:none;">
        
        <label>RESPONSABLE:
          <select name="responsable" required>
            <option></option>
          </select>
        </label><br>
        <!-- jQuery + Select2 (CDN) -->
        <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script>
          $(function() {
            $('select[name="responsable"]').select2({
              placeholder: "",
              allowClear: true
            });
          });
        </script><br><br>

        <label>BREAK:
          <select name="break">
            <option></option>
            <option value="DESAYUNO(25)">DESAYUNO(25)</option>
            <option value="ALMUERZO(45)">ALMUERZO(45)</option>
            <option value="REFRIGERIO(25)">REFRIGERIO(25)</option>
            <option value="CENA(45)">CENA(45)</option>
          </select>
        </label><br>

        <label>TRATAMIENTO:
          <select name="tratamiento" id="tratamiento" required>
            <option></option>
            <option value="AZUL">AZUL</option>
            <option value="VERDE">VERDE</option>
            <option value="TERMINADOS">TERMINADOS</option>
            <option value="REPROCESOS">REPROCESOS</option>
          </select>
        </label><br>

        <label>CALIBRACION/LIMPIEZA DE MAQUINAS/SOLUCION DE NOVEDADES:
          <input type="number" name="calibracion_limpieza_de_maquinas_solucion_de_novedades" min="0" step="1" max="60">
        </label><br>

        <label id="cdlpc">CANTIDAD DE LENTES POR CICLO:
          <input type="number" name="cantidad_de_lentes_por_ciclo" id="cantidad_de_lentes_por_ciclo" min="0" step="1" required>
          <br>
        </label>

        <label id="ndc">NUMERO DE CICLO:
          <select name="numero_del_ciclo" id="numero_del_ciclo" required>
            <option></option>
            <option value="#1 CX">#1 CX</option>
            <option value="#1 CC">#1 CC</option>
            <option value="#2 CX">#2 CX</option>
            <option value="#2 CC">#2 CC</option>
            <option value="#3 CX">#3 CX</option>
            <option value="#3 CC">#3 CC</option>
            <option value="#4 CX">#4 CX</option>
            <option value="#4 CC">#4 CC</option>
            <option value="#5 CX">#5 CX</option>
            <option value="#5 CC">#5 CC</option>
            <option value="#6 CX">#6 CX</option>
            <option value="#6 CC">#6 CC</option>
            <option value="#7 CX">#7 CX</option>
            <option value="#7 CC">#7 CC</option>
            <option value="#8 CX">#8 CX</option>
            <option value="#8 CC">#8 CC</option>
            <option value="#9 CX">#9 CX</option>
            <option value="#9 CC">#9 CC</option>
            <option value="#10 CX">#10 CX</option>
            <option value="#10 CC">#10 CC</option>
            <option value="#11 CX">#11 CX</option>
            <option value="#11 CC">#11 CC</option>
            <option value="#12 CX">#12 CX</option>
            <option value="#12 CC">#12 CC</option>
            <option value="#13 CX">#13 CX</option>
            <option value="#13 CC">#13 CC</option>
            <option value="#14 CX">#14 CX</option>
            <option value="#14 CC">#14 CC</option>
          </select>
          <br>
        </label>
        <script>
          $(function() {
            $('select[name="numero_del_ciclo"]').select2({
              placeholder: "",
              allowClear: true
            });
          });
        </script><br><br>

        <label id="cdlr" style="display: none;">CANTIDAD DE LENTES REPROCESADOS:
          <input type="number" name="cantidad_de_lentes_reprocesados" id="cantidad_de_lentes_reprocesados" min="0" step="1" style="display: none;" required>
          <br>
        </label>

        <label>INVENTARIO:
          <input type="text" name="inventario">
        </label><br>

        <label>OBSERVACIONES:
          <input type="text" name="observaciones">
        </label><br>

        <button type="submit" id="enviar">Enviar</button>
        <p id="respuesta"></p>
        
        <h4 id="bienvenida" style="display: none;"></h4>
        <button onclick="cerrarSesion()" id="cerrar">Cerrar Sesión</button>
      </form>
    </div>
  </div>

  <!-- CIERRE DEL CODIGO -->
  <script src="_script.js"></script> <!-- CONECCION CON EL .JS -->
</body>
</html>
