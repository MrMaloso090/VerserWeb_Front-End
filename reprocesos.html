<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reprocesos</title>
  <link rel="stylesheet" href="style.css"> <!-- CONECCION CON EL .CSS -->
</head>
<body>

  <!-- COMIENZO DEL CODIGO -->

  <div id="contenedor_exterior" class='contenedor'>

    <h2>REPROCESOS</h2>
    
    <nav id="navegador">
      <ul>
        <li><a href="ingresos.html">INGRESOS</a></li>
        <li><a href="salidas.html">SALIDAS</a></li>
        <li><a href="dannos.html">DAÑOS</a></li>
        <li><a href="reprocesos.html">REPROCESOS</a></li>
      </ul>
    </nav>

    <!-- Login -->
    <div id="login">
      <h3>Inicio de Sesion:</h3>
      <input type="password" id="codigo" placeholder="Ingresa tu código">
      <button onclick="verificacion()" id="iniciar">Entrar</button>
      <p id="error" style="color:red; display:none;">Código incorrecto</p>
    </div>
    
    <!-- CUESTIONARIO -->
    <div class='cuestionario' id="cuestionario" style="display:none;">

      <form id="formulario">

        <label>Número de Orden:
          <input type="number" name="numero_orden" id="numero_orden" required min="0" step="1">
        </label><br><br>

        
        <label>Area Responsable:
          <select name="area_responsable" id="area_responsable" required>
            <option></option>
            <option value="DEFECTOS_TALLA">DEFECTOS TALLA</option>
            <option value="DEFECTOS_AR">DEFECTOS AR</option>
            <option value="DEFECTOS_BISEL">DEFECTOS BISEL</option>
            <option value="DEFECTOS_CALIDAD">DEFECTOS CALIDAD</option>
            <option value="DEFECTOS_COATING">DEFECTOS COATING</option>
            <option value="DEFECTOS_DIGITACION">DEFECTOS DIGITACIÓN</option>
            <option value="DEFECTOS_PROVEEDOR">DEFECTOS PROVEEDOR</option>
            <option value="DEFECTOS_INGRESOS">DEFECTOS INGRESOS</option>
          </select>
        </label><br><br> 
        
        <label>Motivo:
          <select name="motivo" id="motivo" required>
            <option></option>
          </select>
        </label><br><br>

        <label>Lente:
          <select required name="lente" id="lente">
            <option></option>
            <option value='OD'>OD</option>
            <option value='OI'>OI</option>
            <option value='AO'>AO</option>
          </select>
        </label><br><br>
                
        <label> Material:
          <select name="material" id="material" required>
            <option></option>
            <option value="POLY_BLANCO">POLY BLANCO</option>
            <option value="ALTO_INDICE">ALTO INDICE</option>
            <option value="PLASTICO_BLANCO">PLASTICO BLANCO</option>
            <option value="PLASTICO_FOTO">PLASTICO FOTO</option>
            <option value="POLY_BLUE_CUT">POLY BLUE CUT</option>
            <option value="POLY_FOTO">POLY FOTO</option>
            <option value="POLY_TRANSITION">POLY TRANSITION</option>
          </select>
        </label><br><br>
      
        <label>Observacion:
          <input type="text" name="observacion" id="observacion"></input>  
        </label><br><br>
            
        
        <button type="submit" id="enviar"> Enviar</button>
        <p id="mensaje_respuesta"></p>

        <h4 id="bienvenida" style="display: none;"></h4>
      </form>

    </div>
    <button onclick="cerrarSesion()" id="cerrar">Cerrar sesion</button>
  </div>

  <!-- CIERRE DEL CODIGO -->
  <script src="script-reprocesos.js"></script> <!-- CONECCION CON EL .JS -->
</body>
</html>
